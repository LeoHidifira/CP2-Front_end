<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <title>Document</title>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <a href="../../index.html"><img src="../assets/logo1.png" alt="" width="300px"></a>
            </div>
            <nav>
                <ul class="leftSide">
                    <li><a href="../../index.html">Início</a></li>
                    <li><a href="./portifolio.html">Menu</a></li>
                    <li><a href="./contato.html">Contato</a></li>
                    <li><a href="./sobre.html">Sobre</a></li>
                </ul>
                <div class="rightSide">
                    <a href="" class="button">Fazer pedido</a>
                </div>
            </nav>
            <div class="menu">
                <div class="menu-icon">
                    <div></div>
                    <div></div>
                    <div></div>
                </div>
            </div>
        </div>
    </header>

    <section class="contato" id="contato">
    <div class="contato-container">

        <div class="contato-info">
            <span class="subtitulo">FALE CONOSCO</span>

            <h2>
                Entre em contato com o
                <span>Satori Kyoto</span>
            </h2>

            <p>
                Tem alguma dúvida, sugestão ou deseja fazer uma reserva especial?
                Nossa equipe está pronta para proporcionar a melhor experiência
                da culinária asiática para você.
            </p>
        </div>

        <form class="formulario-contato">

            <div class="input-group">
                <label for="nome">Nome</label>
                <input 
                    type="text" 
                    id="nome" 
                    placeholder="Digite seu nome"
                >
            </div>

            <div class="input-group">
                <label for="email">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    placeholder="Digite seu email"
                >
            </div>

            <div class="input-group">
                <label for="descricao">Descrição</label>
                <textarea 
                    id="descricao" 
                    rows="6"
                    placeholder="Digite sua mensagem"
                ></textarea>
            </div>

            <button type="submit" class="btn-enviar">
                Enviar mensagem
            </button>

        </form>

        </div>
    </section>
</body>
</html>
